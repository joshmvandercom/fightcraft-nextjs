intro: |
  We are hiring a head jiu-jitsu instructor to lead our BJJ program.

  This is the person our students will learn from, look up to, and stay with
  for years. The role belongs to someone who can teach a beginner their first
  armbar with the same care they bring to coaching a competitor through black
  belt prep — and who understands that the second one only happens because
  the first one was done well.

about_the_opportunity: |
  ## Why this role matters

  Our jiu-jitsu program is the heart of the academy. Members do not stay for
  the marketing or the facility — they stay for the people who teach them and
  the community that forms on the mats. The head instructor sets the tone for
  both.

  This is not a role where you show up, run drills, and leave. You are
  shaping a program. You are mentoring assistant instructors. You are
  building a competition team. You are the reason a kid sticks with BJJ for
  ten years instead of quitting after six months.

  We invest in our instructors. The right person here builds something they
  are proud of and stays for the long term. Several of our most senior
  instructors started here years ago and have grown with the academy.

what_youll_do: |
  ## What you will do

  - Teach the bulk of our adult and kids BJJ classes across the weekly schedule
  - Develop and refine our curriculum from white belt through advanced
  - Lead our competition team — coaching at tournaments, structuring training
    camps, mentoring competitors at every level
  - Mentor our assistant instructors and help them grow into lead roles
  - Run promotion ceremonies, stripe tests, and rank evaluations
  - Be a visible, present part of the academy community

what_we_expect: |
  ## What we expect from you

  **Black belt under a recognized lineage.** Verifiable rank from a
  reputable instructor or academy. Competition experience strongly preferred
  but not required if your teaching record is strong.

  **Real teaching experience.** You have run classes, not just attended
  them. You know the difference between teaching a technique and teaching
  someone how to learn techniques.

  **Patience with beginners.** The hardest students to teach are the ones
  on day one. The instructor who can make a nervous beginner feel capable
  is worth more than one who can only coach competitors.

  **Reliability and presence.** Students plan their week around your
  classes. Showing up on time, every time, prepared, is non-negotiable.

  **Commitment to the long term.** This is a role for someone who wants to
  build something, not someone passing through on the way to opening their
  own school.

what_you_can_expect: |
  ## What you can expect from us

  **A real salary.** This is a full-time role with competitive compensation
  based on your experience and lineage. We pay instructors what the role is
  worth, not what we can get away with.

  **A serious training environment.** Our facility, our schedule, and our
  culture are built for people who take the art seriously. You will be
  teaching motivated students, not coaxing reluctant ones.

  **Support, not interference.** You run the program. We handle the
  business side — marketing, sales, retention, operations — so you can
  focus on the mats.

  **Resources to grow the program.** Equipment, seminar budget, competition
  travel support for the team, and the autonomy to shape the curriculum as
  you see fit.

  **A community worth being part of.** Our members are the kind of people
  you would actually want to train with.

ideal_candidate:
  required:
    - Black belt in Brazilian Jiu-Jitsu under a verifiable lineage
    - Demonstrated experience teaching classes regularly, not just occasionally
    - Ability to teach across all levels — beginner through advanced
    - Patience, presence, and the kind of personality students want to learn from
    - Reliability and professionalism
  helpful:
    - Active or recent competition record (IBJJF, ADCC, regional circuits)
    - Experience coaching competitors through tournament prep
    - Experience developing curriculum or running a program structure
    - Background working with kids' classes
    - CPR/First Aid certification

not_a_fit_if:
  - You are looking for a part-time gig to supplement another job long-term
  - You want to use this role as a stepping stone to opening your own school in the same area within the next two years
  - You see teaching as a chore rather than a craft
  - You cannot commit to a consistent weekly schedule

hiring_process: |
  ## How we hire

  1. **Apply via the form.** Tell us about your background, your lineage,
     and why this role.
  2. **Phone conversation.** 30 minutes to talk through your experience and
     ours.
  3. **In-person visit.** Come to the academy. Train with us. Meet the team.
  4. **Teach a class.** You run a real class for our members. We watch how
     you teach, how you handle questions, how you connect with students.
  5. **Reference and lineage verification.**
  6. **Offer.**

  Total elapsed time: typically 3-4 weeks from application to start date.
