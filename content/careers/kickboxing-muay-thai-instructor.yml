intro: |
  We are hiring a kickboxing and Muay Thai instructor to lead our striking
  program.

  This is the person who will run the rounds, hold the pads, and build the
  program that turns beginners into competent strikers and competent
  strikers into competitors. The role belongs to someone who teaches the
  craft seriously and treats every student like they matter — because they do.

about_the_opportunity: |
  ## Why this role matters

  Our striking program is core to what we offer. For some members it is
  their primary discipline. For others it is what rounds out their grappling.
  Either way, the quality of the program is determined by the person
  running it.

  This is not a role where you teach a few cardio kickboxing classes and
  call it a day. You are building a real striking program — one that gives
  beginners technical foundations, gives intermediates sparring experience
  worth having, and gives competitors a path to the ring or cage if they
  want it.

  We invest in our instructors. The right person here builds something they
  are proud of and stays for the long term.

what_youll_do: |
  ## What you will do

  - Teach the bulk of our adult kickboxing and Muay Thai classes across the
    weekly schedule
  - Develop and refine our curriculum from beginner through advanced
  - Run sparring sessions safely — managing intensity, matchups, and the
    learning environment
  - Coach competitors who want to test themselves at amateur or professional
    levels
  - Mentor assistant instructors and help them develop
  - Run pad rounds, conditioning, and technical sessions with equal
    competence

what_we_expect: |
  ## What we expect from you

  **Real fight or coaching credentials.** Either an amateur/professional
  fight record under recognized organizations, or a documented coaching
  background producing fighters and competent students. Both is ideal.

  **Genuine technical depth.** You can teach a jab properly. You can teach
  a teep properly. You understand why each technique works and can break it
  down for someone who has never thrown a punch.

  **Pad work that matters.** Holding pads is half the job. You can hold for
  beginners learning form, intermediates working combinations, and
  competitors training at high intensity. The right person can do all three
  in the same hour.

  **Safety as a baseline.** You manage sparring with judgment. You match
  partners thoughtfully. You know when to step in. Members trust you with
  their bodies — earn that trust.

  **Reliability and presence.** Members plan their week around your classes.
  Showing up on time, every time, prepared, is non-negotiable.

what_you_can_expect: |
  ## What you can expect from us

  **A real hourly rate.** Competitive compensation based on your experience
  and credentials. We pay instructors what the role is worth, not what we
  can get away with.

  **A serious training environment.** Our facility, our equipment, and our
  culture are built for people who take striking seriously. You will be
  teaching motivated students.

  **Support, not interference.** You run the program. We handle the business
  side — marketing, sales, retention, operations — so you can focus on the
  craft.

  **Resources to grow the program.** Equipment, seminar budget, fight team
  travel support for serious competitors, and the autonomy to shape the
  curriculum.

  **A community worth being part of.** Our members are the kind of people
  you would actually want to train with.

ideal_candidate:
  required:
    - Demonstrable expertise in kickboxing, Muay Thai, or both — through either a fight record, a coaching record, or both
    - Real teaching experience, not just training experience
    - Strong, technically correct pad work
    - The judgment to run sparring safely
    - Reliability and professionalism
  helpful:
    - Amateur or professional fight record under recognized organizations
    - Experience cornering fighters at amateur or professional levels
    - Cross-training in MMA, boxing, or other striking arts
    - Experience teaching kids' striking classes
    - CPR/First Aid certification

not_a_fit_if:
  - You see this as a casual side gig rather than a craft to invest in
  - You want to use this role as a stepping stone to opening your own school in the same area within the next two years
  - You see teaching as a chore rather than a craft
  - You cannot commit to a consistent weekly schedule
  - Your idea of teaching is yelling "harder!" while members hit pads

hiring_process: |
  ## How we hire

  1. **Apply via the form.** Tell us about your background and why this role.
  2. **Phone conversation.** 30 minutes to talk through your experience and
     ours.
  3. **In-person visit.** Come to the academy. Train with us. Meet the team.
  4. **Teach a class.** You run a real class for our members. We watch how
     you teach, how you hold pads, how you connect with students.
  5. **Reference and credential verification.**
  6. **Offer.**

  Total elapsed time: typically 3-4 weeks from application to start date.
