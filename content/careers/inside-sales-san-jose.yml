intro: |
  We are hiring the next General Manager of our San Jose academy.

  You will not start as GM. You will start by proving you can sell. The
  closing role is the apprenticeship. Running the academy is the destination.

  We have done this before. Our last GM walked this exact path and now runs
  our second location. We are looking for the person who will run this one.

about_the_opportunity: |
  ## What this becomes

  Most sales jobs end at the sale. This one starts there.

  Year one, you build a track record. You close memberships, you learn the
  business by doing the work that drives the business, and you earn directly
  in proportion to your performance. Strong performers earn $70K-$100K+ in
  year one. There is no ceiling.

  Year two, you transition into General Manager. Total compensation grows
  into the six figures and continues to scale with the academy's performance.
  You run the operation. You shape the culture. You build the team. You earn
  on what you produce and on what your team produces under you.

  This is a path most sales jobs never offer. We offer it because we have
  built it before and we know it works.

what_youll_earn: |
  ## What you can earn

  | Performance | On-Track Earnings |
  |-------------|-------------------|
  | Slow month | ~$28K annualized |
  | Target month | ~$50K annualized |
  | Strong month | ~$72K annualized |
  | Proven historical pace | $100K+ annualized |

  Our previous closer regularly hit the strong to historical-pace range.
  That is not theoretical. That is what this business produces when the
  right person is in the role.

  Earnings grow from there as you take on operational work, hire and train
  the next salesperson, and step into the GM role. We have engineered the
  path so that compensation increases at every stage — never decreases.

the_lifestyle: |
  ## The schedule

  This role is built around your performance, not your hours.

  You are not chained to a desk. You are not working 9 to 5. You come in
  for scheduled appointments — early mornings, evenings, Saturdays — and
  the rest of your day is yours. Many of our highest performers are at the
  academy 15-20 hours a week and earn six figures.

  That flexibility is part of the compensation. We are paying you to close,
  not to be present. If you can close in 15 hours what others take 40 to do,
  the time you save is yours.

what_we_expect: |
  ## What we expect from you

  **Show up when it matters.** When you have an appointment, you are there
  early, prepared, and present. Reliability is non-negotiable.

  **Follow the process.** We have a playbook. It works. Your job is to run
  it well, not to invent a new one. Creative latitude comes after you have
  proven you can execute what we have already built.

  **Be coachable.** You will get weekly feedback on your numbers and your
  conversations. The people who succeed here treat feedback as a gift.

  **Hit your numbers.** This is a performance role. We will give you every
  tool to succeed. What we cannot give you is the willingness to ask for
  the sale. That has to come from you.

  **Think bigger than the paycheck.** The closing work is the entry point.
  If you only want to close, this is not the right fit. We have built this
  role for someone who wants the path, not just the job.

what_you_can_expect: |
  ## What you can expect from us

  **Real leads.** We invest seriously in marketing and have built a
  pre-qualification funnel that filters out tire-kickers before they ever
  reach you. The people you sit down with want to be there.

  **A complete playbook.** You will not be figuring out what to say. The
  conversation has been documented and refined over years.

  **Training that actually trains.** Two weeks of shadowing, role-play, and
  feedback before you run a solo conversation. We do not throw people in to
  sink or swim.

  **Honesty about the numbers.** You will know exactly how you are
  performing every week. No mystery. No surprises at review time.

  **A real career path.** Most jobs lie about this. We have a previous
  example of someone who walked this path and now runs our second location.
  The path is visible and earned, not vague and dangled.

ideal_candidate:
  required:
    - You are comfortable asking for money and waiting silently for the answer
    - You are reliable — you show up on time, every time, no exceptions
    - You can take feedback without getting defensive
    - You are hungry for an opportunity that pays for performance, not for hours sat in a chair
    - You can hold a real conversation with anyone who walks in the door
  helpful:
    - Background in sales of any kind, especially consultative or in-person (real estate, mortgage, insurance, fitness, recruiting)
    - Athletic or competitive background — you understand pressure and coaching
    - Some familiarity with martial arts, combat sports, or fitness culture
    - You have run something — a team, a small business, a side project. Self-direction matters here.

not_a_fit_if:
  - You need a predictable hourly schedule
  - You need guaranteed weekly income from day one
  - You are uncomfortable with rejection or with directly asking for money
  - You are looking for a stable side gig rather than a real opportunity
  - You think martial arts is cool and figured this would be a fun way to hang around (we hear from a lot of these — please save us both the time)

hiring_process: |
  ## How we hire

  Our hiring process is fast and honest. We respect your time. We expect
  you to respect ours.

  1. **Apply via the form.** Brief, real, in your own voice.
  2. **Phone screen.** 20 minutes to make sure the basics align.
  3. **In-person.** Come to the academy. Meet the team. We talk for an hour
     about you, the role, and the path.
  4. **Role-play.** You run a mock sales conversation using our playbook.
     We are looking for how you think, not for polish.
  5. **Trial week.** Shadow real conversations. Both sides decide if this
     is a fit before either commits.
  6. **Offer.**

  Total elapsed time: 2-3 weeks from application to start date.
