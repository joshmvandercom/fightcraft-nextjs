testimonials:
  - name: "Sarah Bichler"
    stars: 5
    body: "As an introvert who works a high stress medical career I value and look forward to my time at Fightcraft, it has by now become a lifestyle. The various classes during the week make it easy for me to attend around my work schedule. I am in the best shape I've ever been all while nurturing my mental and physical wellbeing."
  - name: "Mr Diaz Sr"
    stars: 5
    body: "Highly recommend! This training facility it is the truth! They offer more then just training! They offer meal plans weekly challenges. And your coach will be available for any questions, concerns or overall advice! This training facility gave me so much confidence and self esteem."
  - name: "Sherry Tang"
    stars: 5
    body: "I've been coming to FightCraft for a few months now and it's been great! I was looking for Muay Thai/Kickboxing classes that weren't purely just a cardio workout and this was a perfect match! The coaches are fantastic and the community of people is great."
  - name: "Eric Kim"
    stars: 5
    body: "Josh and the Fightcraft team have done a great job of having group classes and 1:1 training where you get an awesome workout and learn MMA fundamentals. He is very kind and passionate about teaching MMA fundamentals for anyone and everyone! HIGHLY RECOMMEND!"
  - name: "Zach Holbrook"
    stars: 5
    body: "FIGHTCRAFT is an absolutely amazing gym, with amazing staff/coaches to match. From the moment you walk-in the door you know there is something special about this place. The coaches are extremely knowledgeable, very friendly, and passionate about wanting you to learn the craft correctly."
  - name: "Dakota Smith"
    stars: 5
    body: "This place is awesome! The environment is very laid back and the people are great. I had no prior striking experience before my first class but that was no problem at all. Coach Josh broke everything down so it was easy for me to pick up on things quickly!"
  - name: "Nicholas De Guzman"
    stars: 5
    body: "Been going here for about 3 months and I love this place. I went in as someone with no fighting experience and was intimidated of a MMA gym but the coaches do a very good job of making it easy to hop on the mat and start learning."
  - name: "Sean Gilpin"
    stars: 5
    body: "This is a fantastic gym for learning a wide range of legitimate fighting techniques and getting a great work out. The instructors are all first class and do a great job of keeping the classes challenging and fun. The gym has a friendly and welcoming community."
