    primary_text_2: "Whether you're coming from a boxing background, cross-training from another sport, or stepping onto the mat for the very first time, Muay Thai at FightCraft Brevard will challenge and reward you. The mountain community here trains hard, supports each other, and celebrates every breakthrough together."
