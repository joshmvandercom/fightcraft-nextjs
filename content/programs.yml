    primary_text_1: "FightCraft Brevard brings elite kickboxing instruction to Western North Carolina. Nestled on King Street, our academy offers the same world-class training methodology that built FightCraft's reputation in California — now available in the Blue Ridge Mountains. Whether you're an outdoor enthusiast looking for a new challenge or a complete beginner ready for change, our coaches will meet you where you are."
    primary_text_2: "Kickboxing at FightCraft Brevard is designed for the WNC lifestyle. Our classes deliver a full-body workout that complements your hiking, biking, and mountain adventures while teaching you real combat technique. Experience the community and camaraderie that only a boutique martial arts academy can offer."
    callout_title: "World-Class Training in the Mountains"
    callout_text: "Brevard and the surrounding communities of Hendersonville, Asheville, and the Blue Ridge region now have access to legitimate kickboxing instruction. FightCraft Brevard's program is built on structured progression — you'll see measurable improvement week over week, guided by coaches who genuinely invest in your development."
    bullets:
