faqs:
  - question: "Do you accept beginners?"
    answer: "Absolutely. Our culture is built around taking complete beginners and making them proficient at martial arts. You have support from your coaches as well as the community here."
  - question: "Am I too old?"
    answer: "As long as you are above 7 years of age, we have a class, program and a partner for you. We have people of all ages training here."
  - question: "What do I need to bring?"
    answer: "On your first day just wear comfortable shorts and a white shirt for any of the striking classes. For Jiu Jitsu just bring comfortable shorts and any t-shirt is fine. If equipment is necessary for the class we will provide that for you free of charge."
  - question: "Are there any discounts?"
    answer: "Yes! Ask about discounts for active military, veterans as well as public service discounts. Thank you for what you do for our country and community."
  - question: "Do I have to be in shape to train?"
    answer: "Nope. In fact just coming in and training for a few weeks and you will start being able to run laps around your old self. Our motto is simple. Get Better. Get Tired. Have Fun!"
  - question: "Do I have to fight? Or spar?"
    answer: "Sparring is completely optional. We dedicate Fridays to sparring so if it's not for you you can skip that class altogether. Most students eventually want to spar and even enjoy it very much."
  - question: "Do you have a long term contract?"
    answer: "No long term contracts. If something comes up we make it really easy to cancel with just a 30 day notice."
